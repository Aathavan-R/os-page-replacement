<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Replacement Simulator</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 2px;
            border: 1px solid #2d2d2d;
        }

        h1 {
            text-align: center;
            font-weight: 400;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .team-members {
            text-align: center;
            color: #a0a0a0;
            font-size: 15px;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        label {
            margin-bottom: 8px;
            font-size: 14px;
            color: #a0a0a0;
        }

        input, select {
            padding: 12px;
            background-color: #121212;
            color: #ffffff;
            border: 1px solid #333333;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #5c83d6;
        }

        button {
            padding: 14px 20px;
            background-color: #4a6c9e;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #3d5a84;
        }

        .results {
            margin-top: 40px;
            display: none;
        }

        .comparison-box {
            background-color: #121212;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #333333;
            margin-bottom: 25px;
            text-align: center;
            display: none;
        }

        .summary {
            display: flex;
            justify-content: space-between;
            padding: 25px;
            background-color: #121212;
            border-radius: 6px;
            border: 1px solid #2d2d2d;
            margin-bottom: 30px;
        }

        .summary div {
            text-align: center;
            font-size: 14px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1;
        }

        .summary span {
            display: block;
            font-size: 28px;
            font-weight: 300;
            color: #ffffff;
            margin-top: 8px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 15px;
        }

        th, td {
            border: 1px solid #2d2d2d;
            padding: 12px 6px;
            text-align: center;
        }

        th {
            background-color: #1a1a1a;
            color: #a0a0a0;
            font-weight: 500;
        }

        .frame-label {
            background-color: #1a1a1a;
            color: #a0a0a0;
            font-weight: 400;
        }

        .fault {
            color: #e57373;
            font-weight: bold;
        }

        .hit {
            color: #81c784;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Page Replacement Simulator</h1>
        <div class="team-members">
            Team Members: AATHAVAN R (24CSR002) &nbsp;&bull;&nbsp; AKILESUWARAR S (24CSR016)
        </div>

        <div class="input-row">
            <div class="form-group" style="flex: 1;">
                <label for="algorithm">Algorithm to Visualize</label>
                <select id="algorithm">
                    <option value="FIFO">First In, First Out (FIFO)</option>
                    <option value="LRU">Least Recently Used (LRU)</option>
                    <option value="OPT">Optimal (OPT)</option>
                </select>
            </div>
            
            <div class="form-group" style="flex: 1;">
                <label for="frames">Frames</label>
                <input type="number" id="frames" value="3" min="1">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label for="pages">Reference String</label>
            <input type="text" id="pages" value="7,0,1,2,0,3,0,4,2,3,0,3,2,1,2" placeholder="e.g. 7, 0, 1, 2, 0, 3">
        </div>

        <button onclick="runSimulation()">Run Simulation & Compare</button>

        <div id="results" class="results">
            
            <div id="comparisonBox" class="comparison-box">
                <h3 style="margin-top: 0; color: #e0e0e0; font-weight: 500; margin-bottom: 15px;">Overall Algorithm Comparison</h3>
                <div id="compareText" style="color: #a0a0a0; font-size: 15px;"></div>
                <div id="optimalText" style="color: #ffffff; margin-top: 15px; font-size: 18px;"></div>
            </div>

            <div class="summary">
                <div id="faultsDisplay">Page Faults<span>0</span></div>
                <div id="hitsDisplay">Page Hits<span>0</span></div>
                <div id="rateDisplay">Hit Rate<span>0%</span></div>
            </div>

            <div id="tableContainer" style="overflow-x: auto;">
                <!-- Table will go here -->
            </div>
        </div>
    </div>

    <script>
        function getPagesArray() {
            const raw = document.getElementById('pages').value;
            return raw.split(/[\s,]+/).filter(p => p.trim() !== '');
        }

        function runSimulation() {
            const algo = document.getElementById('algorithm').value;
            const framesCount = parseInt(document.getElementById('frames').value);
            const pages = getPagesArray();

            if (isNaN(framesCount) || framesCount < 1) {
                alert("Please enter a valid number of frames.");
                return;
            }
            if (pages.length === 0) {
                alert("Please enter a reference string.");
                return;
            }

            let result;
            if (algo === 'FIFO') result = simulateFIFO(pages, framesCount);
            else if (algo === 'LRU') result = simulateLRU(pages, framesCount);
            else if (algo === 'OPT') result = simulateOPT(pages, framesCount);

            renderResults(pages, framesCount, result.history, result.faults);
            renderComparison(pages, framesCount);
        }

        function renderComparison(pages, framesCount) {
            const fifoFaults = simulateFIFO(pages, framesCount).faults;
            const lruFaults = simulateLRU(pages, framesCount).faults;
            const optFaults = simulateOPT(pages, framesCount).faults;
            
            const minFaults = Math.min(fifoFaults, lruFaults, optFaults);
            let optimalAlgos = [];
            // Order them by logic: OPT is usually best, then LRU, then FIFO
            if (optFaults === minFaults) optimalAlgos.push('Optimal (OPT)');
            if (lruFaults === minFaults) optimalAlgos.push('LRU');
            if (fifoFaults === minFaults) optimalAlgos.push('FIFO');

            const calcRate = f => pages.length > 0 ? (((pages.length - f) / pages.length) * 100).toFixed(1) : 0;
            
            document.getElementById('comparisonBox').style.display = 'block';
            document.getElementById('compareText').innerHTML = 
                `<strong>FIFO:</strong> ${fifoFaults} faults (${calcRate(fifoFaults)}% Hit Rate) &nbsp;&nbsp;|&nbsp;&nbsp; ` +
                `<strong>LRU:</strong> ${lruFaults} faults (${calcRate(lruFaults)}% Hit Rate) &nbsp;&nbsp;|&nbsp;&nbsp; ` +
                `<strong>OPT:</strong> ${optFaults} faults (${calcRate(optFaults)}% Hit Rate)`;
                
            document.getElementById('optimalText').innerHTML = `💡 Most Optimal Algorithm: <span style="color: #81c784; font-weight: bold;">${optimalAlgos.join(' & ')}</span>`;
        }

        function simulateFIFO(pages, framesCount) {
            let frames = [];
            let history = [];
            let faults = 0;
            
            for (let i = 0; i < pages.length; i++) {
                let page = pages[i];
                let fault = false;
                
                if (!frames.includes(page)) {
                    faults++;
                    fault = true;
                    if (frames.length < framesCount) {
                        frames.push(page);
                    } else {
                        frames.shift();
                        frames.push(page);
                    }
                }
                history.push({ page, frames: [...frames], fault });
            }
            return { faults, history };
        }

        function simulateLRU(pages, framesCount) {
            let frames = [];
            let history = [];
            let faults = 0;
            
            for (let i = 0; i < pages.length; i++) {
                let page = pages[i];
                let fault = false;
                
                let index = frames.indexOf(page);
                if (index === -1) {
                    faults++;
                    fault = true;
                    if (frames.length < framesCount) {
                        frames.push(page);
                    } else {
                        frames.shift(); 
                        frames.push(page); 
                    }
                } else {
                    frames.splice(index, 1);
                    frames.push(page);
                }
                history.push({ page, frames: [...frames], fault });
            }
            return { faults, history };
        }

        function simulateOPT(pages, framesCount) {
            let frames = [];
            let history = [];
            let faults = 0;
            
            for (let i = 0; i < pages.length; i++) {
                let page = pages[i];
                let fault = false;
                
                if (!frames.includes(page)) {
                    faults++;
                    fault = true;
                    if (frames.length < framesCount) {
                        frames.push(page);
                    } else {
                        let farthest = -1;
                        let replaceIdx = -1;
                        for (let j = 0; j < frames.length; j++) {
                            let nextUse = pages.slice(i + 1).indexOf(frames[j]);
                            if (nextUse === -1) {
                                replaceIdx = j;
                                break;
                            } else {
                                if (nextUse > farthest) {
                                    farthest = nextUse;
                                    replaceIdx = j;
                                }
                            }
                        }
                        frames[replaceIdx] = page;
                    }
                }
                history.push({ page, frames: [...frames], fault });
            }
            return { faults, history };
        }

        function renderResults(pages, framesCount, history, faults) {
            document.getElementById('results').style.display = 'block';
            
            const hits = pages.length - faults;
            const hitRate = pages.length > 0 ? ((hits / pages.length) * 100).toFixed(1) : 0;

            document.getElementById("faultsDisplay").innerHTML = 'Page Faults<span>' + faults + '</span>';
            document.getElementById("hitsDisplay").innerHTML = 'Page Hits<span>' + hits + '</span>';
            document.getElementById("rateDisplay").innerHTML = 'Hit Rate<span>' + hitRate + '%</span>';

            let html = '<table><thead><tr><th>Ref</th>';
            for (let i = 0; i < pages.length; i++) {
                html += `<th>${pages[i]}</th>`;
            }
            html += '</tr></thead><tbody>';

            for (let f = 0; f < framesCount; f++) {
                html += `<tr><td class="frame-label">F${f+1}</td>`;
                for (let i = 0; i < history.length; i++) {
                    const stepFrames = history[i].frames;
                    let val = stepFrames[f] !== undefined ? stepFrames[f] : '';
                    html += `<td>${val}</td>`;
                }
                html += `</tr>`;
            }

            html += `<tr><td class="frame-label">Status</td>`;
            for (let i = 0; i < history.length; i++) {
                if (history[i].fault) {
                    html += `<td class="fault">F</td>`;
                } else {
                    html += `<td class="hit">H</td>`;
                }
            }
            html += `</tr></tbody></table>`;

            document.getElementById('tableContainer').innerHTML = html;
        }
    </script>
</body>
</html>
